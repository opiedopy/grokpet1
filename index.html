<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Grok Pet Shop ver 42</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- iOS Safari / Home Screen support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="GrokPet">
    <link rel="apple-touch-icon" href="images/curler-hamster-icon.png">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #fff0f0, #f0fff0);
            color: #333;
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            margin: 40px 20px 30px;
            font-size: 2.8rem;
            font-weight: 600;
            color: #2c3e50;
        }
        .pet-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            flex-wrap: wrap;
            max-width: 800px;
            padding: 0 20px;
        }
        .pet-container img {
            width: 100%;
            max-width: 320px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            transition: transform 0.3s ease;
        }
        .pet-container img:hover {
            transform: scale(1.05);
        }
        
        footer {
            margin-top: auto;
            padding: 20px;
            font-size: 0.9rem;
            color: #777;
        }
    </style>
</head>
<body>
    <h1>Welcome to Grok Pet Shop ver 42a</h1>
    
    <div class="pet-container">
        <img src="images/dog.png" alt="Happy Dog">
        <img src="images/cat.png" alt="Cute Cat">
    </div>
    
    <footer>
        PWA Pet Shop ver 42• Works offline • Installable on iPhone, iPad &amp; Mac
    </footer>

    <script>
     if ('serviceWorker' in navigator) {
// Cache-busting version query (kept for Safari compatibility)
navigator.serviceWorker.register('sw.js?v=5', { scope: './' })
.then(registration => {
console.log('Service Worker registered');
})
.catch(err => console.error('Service Worker registration failed:', err));
}
</script>
</body>
</html>
